apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-rest-api
spec:
  replicas: 2

  selector:
    matchLabels:
      app: go-rest-api

  template:
    metadata:
      labels:
        app: go-rest-api

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"

    spec:
      containers:
        - name: go-rest-api

          image: go-rest-api-basic:v1

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
            limits:
              cpu: "500m"
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: go-rest-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/samidala/go-rest-api-observability-gitops
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true